kind = "web"
previewPath = "/"
title = "Bengali Calendar"
version = "1.0.0"
id = "artifacts/bengali-calendar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22877

[services.development]
run = "pnpm --filter @workspace/bengali-calendar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bengali-calendar", "run", "build" ]
publicDir = "artifacts/bengali-calendar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22877"
BASE_PATH = "/"
