[build]
  base = "."
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/bengali-calendar run build"
  publish = "artifacts/bengali-calendar/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
